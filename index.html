// Lazy load PDF images per scheme
var _pdfLoading = {};
function loadPdfForScheme(id, callback) {
  if (pdfImgs[id]) { if(callback) callback(); return; }
  if (_pdfLoading[id]) return;
  _pdfLoading[id] = true;
  var s = document.createElement('script');
  s.src = 'pdf/' + id + '.js';
  s.onload = function() { _pdfLoading[id] = false; if(callback) callback(); };
  s.onerror = function() { _pdfLoading[id] = false; };
  document.head.appendChild(s);
}
function loadAndShowPdf(id){
  var btn=document.querySelector('#pdfSection_'+id+' button');
  if(btn){btn.textContent='加载中...';btn.disabled=true;}
  loadPdfForScheme(id,function(){
    var pi=uploadedPdfs[id]||pdfImgs[id];
    if(pi&&pi.length>0){
      var sec=document.getElementById('pdfSection_'+id);
      if(sec){
        var h='<h3>方案完整内容（'+pi.length+'页）</h3>';

          h+='<div class="pdf-page-num">第 '+pg.page+' 页</div></div>';
        });
        sec.innerHTML=h;
      }
    }
  });
}

// ============ IndexedDB Storage (replaces localStorage for large data) ============
var IDB_NAME='beike_decor_db',IDB_VER=1,idb=null;
function openIDB(cb){
  if(idb){cb(idb);return;}
  var req=indexedDB.open(IDB_NAME,IDB_VER);
  req.onupgradeneeded=function(e){var db=e.target.result;
    if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv',{keyPath:'k'});
  };
  req.onsuccess=function(e){idb=e.target.result;cb(idb);};
  req.onerror=function(){cb(null);};
}
function idbPut(k,v,cb){
  openIDB(function(db){
    if(!db){if(cb)cb(false);return;}
    var tx=db.transaction('kv','readwrite');
    tx.objectStore('kv').put({k:k,v:v});
    tx.oncomplete=function(){if(cb)cb(true);};
    tx.onerror=function(){if(cb)cb(false);};
  });
}
function idbGet(k,cb){
  openIDB(function(db){
    if(!db){cb(null);return;}
    var tx=db.transaction('kv','readonly');
    var req=tx.objectStore('kv').get(k);
    req.onsuccess=function(){cb(req.result?req.result.v:null);};
    req.onerror=function(){cb(null);};
  });
}
function idbDel(k,cb){
  openIDB(function(db){
    if(!db){if(cb)cb(false);return;}
    var tx=db.transaction('kv','readwrite');
    tx.objectStore('kv').delete(k);
    tx.oncomplete=function(){if(cb)cb(true);};
    tx.onerror=function(){if(cb)cb(false);};
  });
}
// Save to IDB + localStorage fallback for small data
function saveStore(key,data){
  var json=JSON.stringify(data);
  // Always try IDB for large data
  if(key===SK_IMAGES||key===SK_SOURCE||key===SK_PDFS){
    idbPut(key,json);
    // Also try localStorage as backup (ignore quota errors)
    try{localStorage.setItem(key,json);}catch(e){}
  }else{
    try{localStorage.setItem(key,json);}catch(e){}
  }
}

var schemeOverrides={};
var imageOverrides={};

var _idbLoaded=0;
function loadFromIDB(){
  idbGet(SK_IMAGES,function(d){if(d)try{imageOverrides=JSON.parse(d);}catch(e){}_idbLoaded++;checkIDBReady();});
  idbGet(SK_SOURCE,function(d){if(d)try{sourceFiles=JSON.parse(d);}catch(e){}_idbLoaded++;checkIDBReady();});
  idbGet(SK_PDFS,function(d){if(d)try{uploadedPdfs=JSON.parse(d);}catch(e){}_idbLoaded++;checkIDBReady();});
}
function checkIDBReady(){
  if(_idbLoaded>=3&&typeof onStoresReady==='function')onStoresReady();
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function showSpaceImg(src){var d=document.createElement('div');d.className='space-img-modal';d.onclick=function(){d.remove();};d.innerHTML='<img src="'+src+'">';document.body.appendChild(d);}
function formatSpaceDesc(desc){
  if(!desc)return '';
  // Split by comma: items before comma, scenes after comma
  var parts=desc.split('，');
  var h='<div class="space-desc-inner">';
  if(parts.length>=2){
    // First part: items (split by +)
    var items=parts[0].split('+').filter(function(s){return s.trim();});
    h+='<div class="space-items">';
    items.forEach(function(it){h+='<span class="space-item">'+escHtml(it.trim())+'</span>';});
    h+='</div>';
    // Second part: scenes (split by +)
    var scenes=parts.slice(1).join('，').split('+').filter(function(s){return s.trim();});
    if(scenes.length>0){
      h+='<div class="space-scenes">';
      scenes.forEach(function(sc){h+='<span class="space-scene">'+escHtml(sc.trim())+'</span>';});
      h+='</div>';
    }
  }else{
    // No comma: just show as items
    var items2=desc.split('+').filter(function(s){return s.trim();});
    h+='<div class="space-items">';
    items2.forEach(function(it){h+='<span class="space-item">'+escHtml(it.trim())+'</span>';});
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function getImg(key){
  if(!key)return'';
  if(imageOverrides[key])return imageOverrides[key];
  return'';
}

function normalizeScheme(s){
  if(!s.spaces)s.spaces=[];
  if(!s.products)s.products=[];
  if(!s.space)s.space=[];
  if(!s.style)s.style=[];
  if(!s.cust)s.cust=[];
  if(!s.keywords)s.keywords=[];
  s.spaces.forEach(function(sp){
    if(!sp.imgs){if(sp.img){sp.imgs=[sp.img];delete sp.img;}else sp.imgs=[];}
    if(!sp.real_imgs)sp.real_imgs=[];
  });
  return s;
}

function getSchemes(){
  var result={};
  schemes.forEach(function(s){result[s.id]=normalizeScheme(JSON.parse(JSON.stringify(s)));});
  for(var id in schemeOverrides){
    if(schemeOverrides[id]===null){delete result[id];continue;}
    result[id]=normalizeScheme(JSON.parse(JSON.stringify(schemeOverrides[id])));
  }
  return Object.values(result);
}

var allSchemes=getSchemes(),filteredSchemes=allSchemes.slice();

// ============ Filters ============
function applyFilters(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  filteredSchemes=allSchemes.filter(function(s){
    if(activeFilters.style.length&&!activeFilters.style.some(function(t){return s.style.indexOf(t)>=0;}))return false;
    if(activeFilters.cust.length&&!activeFilters.cust.some(function(t){return s.cust.indexOf(t)>=0;}))return false;
    if(q){
      var blob=(s.name+' '+s.sub+' '+s.concept+' '+s.highlight+' '+s.people+' '+s.color+' '+
        (s.style||[]).join(' ')+' '+(s.cust||[]).join(' ')+' '+(s.keywords||[]).join(' ')+' '+
        (s.spaces||[]).map(function(sp){return sp.name+' '+sp.theme+' '+sp.desc;}).join(' ')+
        (s.products||[]).map(function(p){return p.cat+' '+p.name+' '+p.spec+' '+p.brand;}).join(' ')
      ).toLowerCase();
      if(blob.indexOf(q)<0)return false;
    }
    return true;
  });
  currentIdx=0;
  renderSidebar();
  renderPages();
  goTo(0);
}

function clearFilters(){
  activeFilters={style:[],cust:[]};
  document.querySelectorAll('.filter-tags .tag.active').forEach(function(t){t.classList.remove('active');});
  document.getElementById('searchInput').value='';
  applyFilters();
}

// Init filter tag clicks
document.querySelectorAll('.filter-tags').forEach(function(tagsEl){
  var grp=tagsEl.dataset.group;
  tagsEl.querySelectorAll('.tag').forEach(function(t){
    t.onclick=function(){
      t.classList.toggle('active');
      activeFilters[grp]=Array.from(tagsEl.querySelectorAll('.tag.active')).map(function(x){return x.dataset.val;});
      applyFilters();
    };
  });
});

function renderPages(){
  if(!filteredSchemes.length){
    document.getElementById('pagesContainer').innerHTML='<div style="padding:80px 40px;text-align:center;color:#8b7d6b">没有匹配的方案</div>';
    return;
  }
  // Only render current page to keep DOM light
  document.getElementById('pagesContainer').innerHTML=renderPage(currentIdx);
}

function showImgModal(key){/* removed - no image display */}

function goTo(idx){
  if(idx<0||idx>=filteredSchemes.length)return;
  currentIdx=idx;
  // Re-render only current page (keeps DOM light with base64 images)
  document.getElementById('pagesContainer').innerHTML=renderPage(currentIdx);
  document.querySelectorAll('.sidebar-item').forEach(function(s,i){s.classList.toggle('active',i===idx);});
  document.getElementById('navInfo').textContent=(idx+1)+' / '+filteredSchemes.length;
  document.getElementById('btnPrev').disabled=(idx===0);
  document.getElementById('btnNext').disabled=(idx===filteredSchemes.length-1);
  window.scrollTo(0,0);
}
function navPrev(){goTo(currentIdx-1);}
function navNext(){goTo(currentIdx+1);}

// ============ Admin Mode ============
function getEditPwd(){return localStorage.getItem(SK_PWD)||'beike2026';}

function toggleAdminWithPwd(){
  if(adminMode){
    adminMode=false;
    document.getElementById('btnAdmin').textContent='✎ 编辑模式';
    document.getElementById('btnAdmin').classList.remove('active');
    closeAdmin();
    renderPages();
    return;
  }
  document.getElementById('pwdError').classList.remove('show');
  document.getElementById('pwdInput').value='';
  document.getElementById('pwdOverlay').classList.add('show');
  setTimeout(function(){document.getElementById('pwdInput').focus();},100);
}

function checkPwd(){
  var input=document.getElementById('pwdInput').value;
  if(input===getEditPwd()){
    closePwdDialog();
    adminMode=true;
    document.getElementById('btnAdmin').textContent='✅ 编辑中';
    document.getElementById('btnAdmin').classList.add('active');
    renderPages();
    toast('已进入编辑模式');
  }else{
    document.getElementById('pwdError').classList.add('show');
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdInput').focus();
  }
}

function closePwdDialog(){document.getElementById('pwdOverlay').classList.remove('show');}
function closeAdmin(){document.getElementById('adminOverlay').classList.remove('show');document.getElementById('adminDrawer').classList.remove('show');}

      h+='<div class="form-section" style="background:#fff;margin-bottom:8px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong>'+escHtml(p.cat)+(p.name?' - '+escHtml(p.name):'')+'</strong>';
      if(d.products.length>1)h+='<button class="btn btn-sm btn-danger" onclick="removeProduct('+i+')">&#10005;</button>';
      h+='</div>';
      h+='<div class="form-row"><label>品类</label><input class="pr_cat" data-i="'+i+'" value="'+escHtml(p.cat)+'"></div>';
      h+='<div class="form-row"><label>名称</label><input class="pr_name" data-i="'+i+'" value="'+escHtml(p.name)+'"></div>';
      h+='<div class="form-row"><label>规格</label><input class="pr_spec" data-i="'+i+'" value="'+escHtml(p.spec)+'"></div>';
      h+='<div class="form-row"><label>品牌</label><input class="pr_brand" data-i="'+i+'" value="'+escHtml(p.brand)+'"></div>';
      h+='<div class="form-row"><label>产品介绍</label><textarea class="pr_desc" data-i="'+i+'" rows="2">'+escHtml(p.desc||'')+'</textarea></div>';
      h+='</div>';
    });
  }
  h+='</div>';
  h+='<div class="actions-bar"><button class="btn btn-secondary" onclick="closeAdmin()">取消</button>';
  if(!editIsNew)h+='<button class="btn btn-danger" onclick="deleteScheme(\''+d.id+'\')">删除方案</button>';
  h+='<button class="btn btn-primary" onclick="saveScheme()">&#128190; 保存</button></div>';
  drawer.innerHTML=h;
  document.getElementById('adminOverlay').classList.add('show');
  drawer.classList.add('show');
}

// ============ Image Upload ============
function uploadImg(type,idx){
  var fileId;
  if(type==='cover')fileId='file_cover';
  else if(type==='scheme')fileId='file_scheme_'+idx;
  else if(type==='real')fileId='file_real_'+idx;
  var el=document.getElementById(fileId);
  if(!el){
    // Re-create the file input if missing (drawer re-render may have removed it)
    var newInput=document.createElement('input');
    newInput.type='file';newInput.id=fileId;newInput.accept='image/*';
    newInput.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
    newInput.onchange=function(ev){handleUpload(ev,type,idx);};
    document.body.appendChild(newInput);
    el=newInput;
  }
  el.value='';  // reset so same file triggers onchange
  el.click();
}

function handleUpload(e,type,idx){
  var file=e.target.files[0];if(!file)return;
  toast('正在处理图片...');
  var maxW=type==='cover'?1400:1200;
  var quality=0.88;
  compressImg(file,maxW,quality,function(dataUrl){
    var key='custom_'+type+'_'+idx+'_'+Date.now();
    imageOverrides[key]=dataUrl;
    try{saveStore(SK_IMAGES,imageOverrides);}catch(er){toast('存储空间不足，请清理数据');return;}
    markUnsaved();
    if(type==='cover'){editData.cover=key;}
    else if(type==='scheme'){if(!editData.spaces[idx].imgs)editData.spaces[idx].imgs=[];editData.spaces[idx].imgs.push(key);}
    else if(type==='real'){if(!editData.spaces[idx].real_imgs)editData.spaces[idx].real_imgs=[];editData.spaces[idx].real_imgs.push(key);}
    renderAdminDrawer();
    toast('图片已上传');
  });
}

function removeImg(type,spaceIdx,imgIdx){
  if(type==='scheme')editData.spaces[spaceIdx].imgs.splice(imgIdx,1);
  else if(type==='real')editData.spaces[spaceIdx].real_imgs.splice(imgIdx,1);
  renderAdminDrawer();
  toast('图片已移除');
}

function compressImg(file,maxW,quality,cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    var c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    var webpData=c.toDataURL('image/webp',quality);
    cb(webpData.indexOf('image/webp')!==-1?webpData:c.toDataURL('image/jpeg',quality));
    URL.revokeObjectURL(img.src);
  };
  img.onerror=function(){toast('图片加载失败，请重试');URL.revokeObjectURL(img.src);};
  img.src=URL.createObjectURL(file);
}

// ============ Form Data & Save ============
function collectFormData(){
  var el=function(id){return document.getElementById(id);};
  if(el('af_id'))editData.id=el('af_id').value.trim();
  if(el('af_name'))editData.name=el('af_name').value.trim();
  if(el('af_sub'))editData.sub=el('af_sub').value.trim();
  if(el('af_style'))editData.style=el('af_style').value.split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(el('af_space'))editData.space=el('af_space').value.split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(el('af_cust'))editData.cust=el('af_cust').value.split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(el('af_keywords'))editData.keywords=el('af_keywords').value.split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(el('af_color'))editData.color=el('af_color').value.trim();
  if(el('af_people'))editData.people=el('af_people').value.trim();
  if(el('af_concept'))editData.concept=el('af_concept').value.trim();
  if(el('af_highlight'))editData.highlight=el('af_highlight').value.trim();
  document.querySelectorAll('.sp_name').forEach(function(elem){
    var i=parseInt(elem.dataset.i);
    if(editData.spaces&&editData.spaces[i]){
      editData.spaces[i].name=elem.value;
      var t=document.querySelector('.sp_theme[data-i="'+i+'"]');
      var d=document.querySelector('.sp_desc[data-i="'+i+'"]');
      if(t)editData.spaces[i].theme=t.value;
      if(d)editData.spaces[i].desc=d.value;
    }
  });
  document.querySelectorAll('.pr_cat').forEach(function(elem){
    var i=parseInt(elem.dataset.i);
    if(editData.products&&editData.products[i]){
      editData.products[i].cat=elem.value;
      var n=document.querySelector('.pr_name[data-i="'+i+'"]');
      var s=document.querySelector('.pr_spec[data-i="'+i+'"]');
      var b=document.querySelector('.pr_brand[data-i="'+i+'"]');
      var d=document.querySelector('.pr_desc[data-i="'+i+'"]');
      if(n)editData.products[i].name=n.value;
      if(s)editData.products[i].spec=s.value;
      if(b)editData.products[i].brand=b.value;
      if(d)editData.products[i].desc=d.value;
    }
  });
}

function saveScheme(){
  collectFormData();
  if(!editData.name){toast('请填写方案名称');return;}
  if(!editData.id){toast('方案ID不能为空');return;}
  schemeOverrides[editData.id]=editData;
  localStorage.setItem(SK_SCHEMES,JSON.stringify(schemeOverrides));
  markUnsaved();
  toast(editIsNew?'方案已添加！':'方案已保存！');
  closeAdmin();
  allSchemes=getSchemes();
  applyFilters();
}

function addSpace(){collectFormData();if(!editData.spaces)editData.spaces=[];editData.spaces.push({name:'新空间',theme:'',imgs:[],real_imgs:[],desc:''});renderAdminDrawer();}
function removeSpace(i){collectFormData();editData.spaces.splice(i,1);renderAdminDrawer();}
function addProduct(){collectFormData();if(!editData.products)editData.products=[];editData.products.push({cat:'品类',name:'',spec:'',brand:'',desc:'',img:''});renderAdminDrawer();}
function removeProduct(i){collectFormData();editData.products.splice(i,1);renderAdminDrawer();}

function deleteScheme(id){
  if(!confirm('确定删除方案「'+id+'」吗？'))return;
  schemeOverrides[id]=null;
  localStorage.setItem(SK_SCHEMES,JSON.stringify(schemeOverrides));
  delete sourceFiles[id];
  saveStore(SK_SOURCE,sourceFiles);
  markUnsaved();
  toast('方案已删除');
  closeAdmin();
  allSchemes=getSchemes();
  applyFilters();
}

function downloadSourceFile(id){
  var sf=sourceFiles[id];
  if(!sf){toast('源文件不存在');return;}
  var a=document.createElement('a');
  a.href=sf.data;a.download=sf.name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('开始下载：'+sf.name);
}
function deleteUpload(id){
  if(!confirm('确定删除已上传的方案内容？'))return;
  delete sourceFiles[id];delete uploadedPdfs[id];
  try{localStorage.removeItem(SK_SOURCE);localStorage.removeItem(SK_PDFS);idbDel(SK_SOURCE);idbDel(SK_PDFS);}catch(e){}
  try{saveStore(SK_SOURCE,sourceFiles);}catch(e){}
  try{saveStore(SK_PDFS,uploadedPdfs);}catch(e){}
  markUnsaved();goTo(currentIdx);toast('已删除');
}

function handleSchemeUpload(e,id){
  var file=e.target.files[0];if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  toast('正在处理：'+file.name);

  if(ext==='pdf'&&typeof pdfjsLib!=='undefined'){
    // PDF: render pages to images using PDF.js
    var reader=new FileReader();
    reader.onload=function(ev){
      var typedArr=new Uint8Array(ev.target.result);
      pdfjsLib.getDocument({data:typedArr}).promise.then(function(pdf){
        var pages=[];
        var processed=0;
        var total=pdf.numPages;
        for(var p=1;p<=total;p++){
          (function(pageNum){
            pdf.getPage(pageNum).then(function(page){
              var scale=1.2;
              var viewport=page.getViewport({scale:scale});
              var canvas=document.createElement('canvas');
              canvas.width=viewport.width;
              canvas.height=viewport.height;
              var ctx=canvas.getContext('2d');
              page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){
                var imgData=canvas.toDataURL('image/jpeg',0.7);
                pages.push({page:pageNum,img:imgData});
                processed++;
                if(processed===total){
                  pages.sort(function(a,b){return a.page-b.page;});
                  uploadedPdfs[id]=pages;
                  saveStore(SK_PDFS,uploadedPdfs);
                  sourceFiles[id]={name:file.name,data:ev.target.result,size:file.size};
                  saveStore(SK_SOURCE,sourceFiles);
                  markUnsaved();
                  toast('PDF已渲染 '+total+' 页');
                  renderPages();goTo(currentIdx);
                }
              });
            });
          })(p);
        }
      }).catch(function(){toast('PDF解析失败，已保存为附件');saveAsAttachment(file,ev.target.result,id);});
    };
    reader.readAsArrayBuffer(file);
  }else if(ext==='jpg'||ext==='jpeg'||ext==='png'){
    // Image: store as single page
    var reader2=new FileReader();
    reader2.onload=function(ev){
      uploadedPdfs[id]=[{page:1,img:ev.target.result}];
      saveStore(SK_PDFS,uploadedPdfs);
      sourceFiles[id]={name:file.name,data:ev.target.result,size:file.size};
      saveStore(SK_SOURCE,sourceFiles);
      markUnsaved();
      toast('图片已上传');
      renderPages();goTo(currentIdx);
    };
    reader2.readAsDataURL(file);
  }else{
    // Other files: save as attachment only
    var reader3=new FileReader();
    reader3.onload=function(ev){
      saveAsAttachment(file,ev.target.result,id);
    };
    reader3.readAsDataURL(file);
  }
  e.target.value='';
}

function saveAsAttachment(file,data,id){
  sourceFiles[id]={name:file.name,data:data,size:file.size};
  saveStore(SK_SOURCE,sourceFiles);
  markUnsaved();
  toast('文件已保存为附件：'+file.name);
  renderPages();goTo(currentIdx);
}

// ============ Bake To File ============
var _hasUnsavedChanges=false;

function markUnsaved(){
  _hasUnsavedChanges=true;
  var btn=document.getElementById('btnBake');
  if(btn){btn.style.background='#e85d3a';btn.style.borderColor='#e85d3a';}
}

function getStorageUsage(){
  var items=[
    {name:'方案数据',key:SK_SCHEMES,data:schemeOverrides},
    {name:'空间图片',key:SK_IMAGES,data:imageOverrides},
    {name:'源文件',key:SK_SOURCE,data:sourceFiles},
    {name:'PDF页面',key:SK_PDFS,data:uploadedPdfs}
  ];
  var total=0,lines=[];
  items.forEach(function(it){
    var s=0;try{s=JSON.stringify(it.data).length;}catch(e){}
    var mb=(s/1024/1024).toFixed(1);
    total+=s;lines.push(it.name+': '+mb+'MB');
  });
  var totalMb=(total/1024/1024).toFixed(1);
  return {total:total,totalMb:totalMb,lines:lines};
}
function showStorageInfo(){
  var u=getStorageUsage();
  var msg='存储使用情况（总计 '+u.totalMb+'MB）:\n\n'+u.lines.join('\n')+'\n\nIndexedDB 无容量限制，可放心使用。';
  alert(msg);
}
function bakeToFile(){
  var data={schemeOverrides:schemeOverrides,imageOverrides:imageOverrides,sourceFiles:sourceFiles,uploadedPdfs:uploadedPdfs};
  var jsonStr=JSON.stringify(data);
  var encoded=jsonStr.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  fetch(location.href).then(function(r){return r.text();}).then(function(originalHTML){
    var newHTML=originalHTML.replace(
      /<div id="saved-data"[^>]*><\/div>/,
      '<div id="saved-data" style="display:none" data-json="'+encoded+'"></div>'
    );
    if(newHTML===originalHTML){toast('保存失败');return;}
    var blob=new Blob([newHTML],{type:'text/html'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='soft_decor_v2.html';
    a.click();
    URL.revokeObjectURL(a.href);
    try{localStorage.removeItem(SK_SCHEMES);localStorage.removeItem(SK_IMAGES);localStorage.removeItem(SK_SOURCE);localStorage.removeItem(SK_PDFS);}catch(e){} idbDel(SK_IMAGES);idbDel(SK_SOURCE);idbDel(SK_PDFS);
    _hasUnsavedChanges=false;
    var btn=document.getElementById('btnBake');
    if(btn){btn.style.background='';btn.style.borderColor='';}
    toast('文件已下载，请用下载的文件替换原文件');
  }).catch(function(){
    var savedDataEl=document.getElementById('saved-data');
    if(savedDataEl)savedDataEl.setAttribute('data-json',encoded);
    var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
    var blob=new Blob([html],{type:'text/html'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='soft_decor_v2.html';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('文件已下载');
  });
}

// ============ Export/Import ============
function exportAll(){
  var data={version:'2.3',exportTime:new Date().toISOString(),schemeOverrides:schemeOverrides,imageOverrides:imageOverrides,sourceFiles:sourceFiles,uploadedPdfs:uploadedPdfs};
  var blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='软装方案库_备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('备份已导出');
}

function importAll(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(data.schemeOverrides){Object.assign(schemeOverrides,data.schemeOverrides);localStorage.setItem(SK_SCHEMES,JSON.stringify(schemeOverrides));}
      if(data.imageOverrides){Object.assign(imageOverrides,data.imageOverrides);saveStore(SK_IMAGES,imageOverrides);}
      if(data.sourceFiles){Object.assign(sourceFiles,data.sourceFiles);saveStore(SK_SOURCE,sourceFiles);}
      if(data.uploadedPdfs){Object.assign(uploadedPdfs,data.uploadedPdfs);saveStore(SK_PDFS,uploadedPdfs);}
      markUnsaved();
      toast('备份已恢复！');
      allSchemes=getSchemes();
      applyFilters();
    }catch(err){toast('导入失败：文件格式错误');}
  };
  reader.readAsText(file);e.target.value='';
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')navPrev();
  if(e.key==='ArrowRight')navNext();
});

renderSidebar();
renderPages();
goTo(0);

if(Object.keys(schemeOverrides).length>0||Object.keys(imageOverrides).length>0||Object.keys(sourceFiles).length>0){markUnsaved();}
